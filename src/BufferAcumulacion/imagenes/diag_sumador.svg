<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A6FD8"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1b2a4a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- card -->
  <rect x="24" y="24" width="1232" height="672" rx="26" fill="#FFFFFF" stroke="#E4E9F2" stroke-width="2"/>

  <!-- title -->
  <text x="640" y="86" text-anchor="middle" font-size="36" font-weight="700" fill="#3A6FD8">El buffer como «sumador» de imágenes</text>

  <!-- three renders -->
  <g filter="url(#soft)">
    <rect x="80"  y="150" width="180" height="112" rx="12" fill="#EEF3FC" stroke="#C7D6F2" stroke-width="2"/>
    <rect x="80"  y="304" width="180" height="112" rx="12" fill="#EEF3FC" stroke="#C7D6F2" stroke-width="2"/>
    <rect x="80"  y="458" width="180" height="112" rx="12" fill="#EEF3FC" stroke="#C7D6F2" stroke-width="2"/>
  </g>
  <!-- mini scene glyphs -->
  <circle cx="135" cy="196" r="20" fill="#3A6FD8" opacity="0.85"/>
  <rect x="170" y="206" width="60" height="36" rx="6" fill="#9DBBF0"/>
  <polygon points="135,330 162,386 108,386" fill="#3A6FD8" opacity="0.85"/>
  <rect x="170" y="360" width="60" height="26" rx="6" fill="#9DBBF0"/>
  <rect x="108" y="486" width="54" height="54" rx="8" fill="#3A6FD8" opacity="0.85"/>
  <circle cx="205" cy="514" r="22" fill="#9DBBF0"/>

  <text x="170" y="142" text-anchor="middle" font-size="19" font-weight="600" fill="#25303B">Render 1</text>
  <text x="170" y="296" text-anchor="middle" font-size="19" font-weight="600" fill="#25303B">Render 2</text>
  <text x="170" y="450" text-anchor="middle" font-size="19" font-weight="600" fill="#25303B">Render N</text>

  <!-- plus signs (left margin, between thumbnails) -->
  <text x="52" y="295" text-anchor="middle" font-size="40" font-weight="700" fill="#3A6FD8">+</text>
  <text x="52" y="449" text-anchor="middle" font-size="40" font-weight="700" fill="#3A6FD8">+</text>

  <!-- converging arrows -->
  <path d="M268,206 C400,206 420,360 520,360" fill="none" stroke="#3A6FD8" stroke-width="2.5"/>
  <path d="M268,360 L520,360" fill="none" stroke="#3A6FD8" stroke-width="2.5"/>
  <path d="M268,514 C400,514 420,360 520,360" fill="none" stroke="#3A6FD8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- accumulation buffer box -->
  <g filter="url(#soft)">
    <rect x="540" y="252" width="372" height="216" rx="20" fill="#EAF1FE" stroke="#3A6FD8" stroke-width="2.5"/>
  </g>
  <text x="726" y="322" text-anchor="middle" font-size="64" font-weight="700" fill="#3A6FD8">&#931;</text>
  <text x="726" y="372" text-anchor="middle" font-size="25" font-weight="700" fill="#25303B">BUFFER DE</text>
  <text x="726" y="402" text-anchor="middle" font-size="25" font-weight="700" fill="#25303B">ACUMULACIÓN</text>
  <text x="726" y="438" text-anchor="middle" font-size="17" fill="#5B6B7B">espacio de alta precisión (float)</text>

  <!-- arrow to result -->
  <path d="M912,360 L1008,360" fill="none" stroke="#3A6FD8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="960" y="345" text-anchor="middle" font-size="18" font-weight="700" fill="#3A6FD8">=</text>

  <!-- result thumbnail -->
  <g filter="url(#soft)">
    <rect x="1020" y="300" width="170" height="120" rx="12" fill="#FFFFFF" stroke="#C7D6F2" stroke-width="2"/>
  </g>
  <circle cx="1075" cy="350" r="20" fill="#3A6FD8"/>
  <rect x="1108" y="360" width="60" height="34" rx="6" fill="#9DBBF0"/>
  <text x="1105" y="292" text-anchor="middle" font-size="19" font-weight="600" fill="#25303B">Imagen final</text>
  <text x="1105" y="452" text-anchor="middle" font-size="17" fill="#5B6B7B">&#8594; Color buffer / Pantalla</text>

  <!-- caption -->
  <text x="640" y="628" text-anchor="middle" font-size="20" fill="#25303B">Acumula (promedia ponderadamente) varios renders y, al final, copia el resultado al color buffer.</text>
  <text x="640" y="662" text-anchor="middle" font-size="17" fill="#5B6B7B">No recibe geometría directamente: solo acepta el contenido del color buffer.</text>
</svg>
